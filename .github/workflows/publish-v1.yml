name: Publish v1.0.0

on:
  workflow_dispatch:

concurrency:
  group: publish-v1
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest
      - name: Publish @mctx-ai/mcp-server
        run: npm publish --provenance --access public
        working-directory: packages/server
      - name: Publish @mctx-ai/mcp-dev
        run: npm publish --provenance --access public
        working-directory: packages/dev
      - name: Publish create-mctx-server
        run: npm publish --provenance --access public
        working-directory: packages/create-mctx-server
      - name: Wait for npm propagation
        run: sleep 30
      - name: Verify @mctx-ai/mcp-server@1.0.0
        run: npm view @mctx-ai/mcp-server version
      - name: Verify @mctx-ai/mcp-dev@1.0.0
        run: npm view @mctx-ai/mcp-dev version
      - name: Verify create-mctx-server@1.0.0
        run: npm view create-mctx-server version
